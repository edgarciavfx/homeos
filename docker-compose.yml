services:
  postgres:
    image: postgres:16
    container_name: homeos-postgres
    environment:
      POSTGRES_DB: homeos_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbackup:
    image: postgres:16
    container_name: homeos-pgbackup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c '
        while true; do
          DATE=$$(date +%Y%m%d-%H%M%S)
          pg_dump -h postgres -U postgres homeos_dev > /backups/homeos_dev-$$DATE.sql
          echo "Backup created: homeos_dev-$$DATE.sql"
          # Keep only last 7 backups
          ls -t /backups/homeos_dev-*.sql | tail -n +8 | xargs -r rm
          sleep 86400
        done
      '

volumes:
  postgres_data:
